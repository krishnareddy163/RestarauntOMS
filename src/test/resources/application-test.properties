spring.application.name=restaurantos-test

# PostgreSQL Configuration for Testing
spring.datasource.url=jdbc:h2:mem:restaurant_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS restaurant\\;SET SCHEMA restaurant
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=restaurant
spring.jpa.defer-datasource-initialization=true

# Disable Flyway for tests (H2 schema differs from production)
spring.flyway.enabled=false

# Kafka Configuration for Testing
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.group-id=restaurant-system-test-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.restaurant.*
spring.kafka.listener.auto-startup=false

# Kafka Topics
kafka.topics.order-created=order.created
kafka.topics.payment-processed=payment.processed
kafka.topics.inventory-updated=inventory.updated
kafka.topics.preparation-started=preparation.started
kafka.topics.preparation-completed=preparation.completed
kafka.topics.driver-notified=driver.notified
kafka.topics.delivery-started=delivery.started
kafka.topics.delivery-completed=delivery.completed

# Actuator & Monitoring Configuration
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.example.restaurant=DEBUG
