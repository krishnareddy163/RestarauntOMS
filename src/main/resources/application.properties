spring.application.name=restaurantos

# PostgreSQL Configuration (Free, Open Source)
spring.datasource.url=jdbc:postgresql://localhost:5432/restaurant_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.default_schema=restaurant

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=restaurant
spring.flyway.default-schema=restaurant

# Connection Pool Configuration for High Concurrency
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=restaurant-system-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.restaurant.*
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.linger.ms=10
spring.kafka.producer.batch-size=16384

# Kafka Topics
kafka.topics.order-created=order.created
kafka.topics.payment-processed=payment.processed
kafka.topics.inventory-updated=inventory.updated
kafka.topics.preparation-started=preparation.started
kafka.topics.preparation-completed=preparation.completed
kafka.topics.driver-notified=driver.notified
kafka.topics.delivery-started=delivery.started
kafka.topics.delivery-completed=delivery.completed

# Actuator & Monitoring Configuration
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.endpoint.health.show-details=when-authorized

# Server Configuration for High Load
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging
logging.level.root=INFO
logging.level.com.example.restaurant=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
restaurantos.app.jwtSecret=restaurantosSecretKeyForJwtTokenGenerationAndValidation12345678901234567890
restaurantos.app.jwtExpirationMs=86400000
