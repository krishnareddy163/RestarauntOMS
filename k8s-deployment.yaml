apiVersion: v1
kind: Namespace
metadata:
  name: restaurantos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurantos-api
  namespace: restaurantos
  labels:
    app: restaurantos
    version: 1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: restaurantos
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: restaurantos
        version: 1.0.0
    spec:
      serviceAccountName: restaurantos
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: restaurantos
        image: your-docker-registry/restaurantos:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: restaurantos-secrets
              key: db-url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: restaurantos-secrets
              key: db-username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: restaurantos-secrets
              key: db-password
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: restaurantos-config
              key: kafka-bootstrap-servers
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: restaurantos-service
  namespace: restaurantos
  labels:
    app: restaurantos
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8081
    protocol: TCP
  selector:
    app: restaurantos
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: restaurantos-hpa
  namespace: restaurantos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: restaurantos-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restaurantos
  namespace: restaurantos
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: restaurantos-role
  namespace: restaurantos
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: restaurantos-rolebinding
  namespace: restaurantos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: restaurantos-role
subjects:
- kind: ServiceAccount
  name: restaurantos
  namespace: restaurantos

